// ── localStorage-backed storage polyfill ─────────────────────────────────────
window.storage = {
  get: (key) => {
    try {
      const v = localStorage.getItem("hbs_pos_" + key);
      return Promise.resolve(v !== null ? { key, value: v } : null);
    } catch(e) { return Promise.resolve(null); }
  },
  set: (key, value) => {
    try {
      localStorage.setItem("hbs_pos_" + key, value);
      return Promise.resolve({ key, value });
    } catch(e) { return Promise.resolve(null); }
  },
  delete: (key) => {
    try {
      localStorage.removeItem("hbs_pos_" + key);
      return Promise.resolve({ key, deleted: true });
    } catch(e) { return Promise.resolve(null); }
  },
  list: (prefix = "") => {
    try {
      const keys = Object.keys(localStorage)
        .filter(k => k.startsWith("hbs_pos_" + prefix))
        .map(k => k.replace("hbs_pos_", ""));
      return Promise.resolve({ keys, prefix });
    } catch(e) { return Promise.resolve({ keys: [] }); }
  }
};

// ── Bluetooth Printer Engine ─────────────────────────────────────────────────
class BTPrinter {
  constructor(){this.char=null;this.device=null;this._name="";}
  get isSupported(){try{return typeof navigator!=="undefined"&&!!navigator.bluetooth;}catch(e){return false;}}
  async requestDevice(){
    if(!this.isSupported) throw {code:"UNSUPPORTED",msg:"Web Bluetooth not available.\nUse Chrome on Android or Desktop."};
    try{
      return await navigator.bluetooth.requestDevice({
        acceptAllDevices:true,
        optionalServices:["000018f0-0000-1000-8000-00805f9b34fb","e7810a71-73ae-499d-8c15-faa9aef0c3f2",
          "49535343-fe7d-4ae5-8fa9-9fafd205e455","00001101-0000-1000-8000-00805f9b34fb","0000ff00-0000-1000-8000-00805f9b34fb"]
      });
    }catch(e){
      if(e.name==="NotFoundError"||e.message?.includes("User cancelled")) throw {code:"CANCELLED",msg:"No device selected."};
      if(e.name==="SecurityError") throw {code:"BLOCKED",msg:"Bluetooth blocked. Open page directly in Chrome."};
      throw {code:"ERROR",msg:e.message||"Unknown Bluetooth error"};
    }
  }
  async connectDevice(device){
    this.device=device; this._name=device.name||"Thermal Printer";
    try{
      const server=await device.gatt.connect();
      device.addEventListener("gattserverdisconnected",()=>{this.char=null;});
      const svcIds=["000018f0-0000-1000-8000-00805f9b34fb","e7810a71-73ae-499d-8c15-faa9aef0c3f2",
        "49535343-fe7d-4ae5-8fa9-9fafd205e455","0000ff00-0000-1000-8000-00805f9b34fb"];
      for(const id of svcIds){
        try{const svc=await server.getPrimaryService(id);const chars=await svc.getCharacteristics();
          for(const c of chars){if(c.properties.write||c.properties.writeWithoutResponse){this.char=c;return this._name;}}
        }catch(e){}
      }
      try{const svcs=await server.getPrimaryServices();for(const svc of svcs){const chars=await svc.getCharacteristics();
        for(const c of chars){if(c.properties.write||c.properties.writeWithoutResponse){this.char=c;return this._name;}}}
      }catch(e){}
      throw {code:"NO_CHAR",msg:"Connected but couldn't find print channel."};
    }catch(e){this.device=null;if(e.code)throw e;throw {code:"CONNECT_FAIL",msg:"Failed: "+(e.message||"GATT error")};}
  }
  async print(data){
    if(!this.char)throw new Error("Printer not connected");
    for(let i=0;i<data.length;i+=512){
      await this.char.writeValueWithoutResponse(data.slice(i,i+512));
      await new Promise(r=>setTimeout(r,60));
    }
  }
  disconnect(){try{if(this.device?.gatt?.connected)this.device.gatt.disconnect();}catch(e){}this.char=null;this.device=null;}
  get connected(){return!!this.char;}
  get deviceName(){return this._name;}
}
const btPrinter=new BTPrinter();

    if(!foundDevice)return;setPhase("connecting");

          </div>}
          {btAvail&&phase==="idle"&&<div style={{textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:14}}>🖨️</div>
            <div style={{fontFamily:"'Rajdhani'",fontSize:16,fontWeight:700,color:G.text,marginBottom:6}}>Find Your Printer</div>

            <button className="fb fb-p" onClick={startScan} style={{width:"100%",padding:14,fontSize:14,borderRadius:10}}>🔍 Search for Printers</button>

              <div style={{position:"absolute",inset:0,borderRadius:"50%",border:`3px solid rgba(192,57,43,.15)`,animation:"btRing1 1.4s ease-in-out infinite"}}/>
              <div style={{position:"absolute",inset:10,borderRadius:"50%",border:`3px solid rgba(192,57,43,.3)`,animation:"btRing2 1.4s ease-in-out infinite .2s"}}/>
              <div style={{position:"absolute",inset:20,borderRadius:"50%",border:`3px solid rgba(192,57,43,.5)`,animation:"btRing3 1.4s ease-in-out infinite .4s"}}/>
              <div style={{position:"absolute",inset:28,borderRadius:"50%",background:G.red,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>📡</div>
            </div>
            <div style={{fontFamily:"'Rajdhani'",fontSize:16,fontWeight:700,color:G.text}}>Searching…</div>
          </div>}
          {phase==="found"&&foundDevice&&<div style={{textAlign:"center"}}>
            <div style={{fontSize:48,marginBottom:12}}>🖨️</div>
            <div style={{background:G.card,border:`1px solid ${G.green}`,borderRadius:10,padding:"14px 16px",margin:"14px 0",display:"flex",alignItems:"center",gap:12}}>

            <button className="fb fb-s" onClick={()=>setPhase("idle")} style={{width:"100%",padding:10,fontSize:12,borderRadius:10}}>← Search Again</button>
          </div>}

            <div style={{fontSize:40,marginBottom:14,animation:"btPulse 1s ease infinite"}}>🔗</div>

  );

function buildReceiptText(bill,org){
  const W=32,ln="─".repeat(W);
  const c=s=>{const sp=Math.max(0,W-s.length);return" ".repeat(Math.floor(sp/2))+s;};
  const row=(l,r)=>{const sp=Math.max(1,W-l.length-r.length);return l+" ".repeat(sp)+r;};
  let r="";
  r+=c(org.name.slice(0,W))+"\n";if(org.address)r+=c(org.address.slice(0,W))+"\n";
  if(org.phone)r+=c(org.phone)+"\n";if(org.gstNo)r+=c("GSTIN: "+org.gstNo)+"\n";
  if(org.fssaiNo)r+=c("FSSAI: "+org.fssaiNo)+"\n";
  r+=ln+"\n";r+=row("Bill No:","#"+bill.billNo)+"\n";r+=row("Date:",bill.date)+"\n";
  r+=row("Time:",bill.time)+"\n";r+=row("Staff:",bill.staff)+"\n";r+=row("Payment:",bill.paymentMode)+"\n";
  r+=ln+"\n";r+=row("Item","Amt")+"\n";r+=ln+"\n";
  bill.items.forEach(it=>{
    const nv=it.name+(it.variant&&it.variant!=="Regular"?" ("+it.variant+")":"");
    const amt="₹"+(it.qty*it.price);
    if(nv.length+amt.length+2<=W)r+=row(nv,amt)+"\n";
    else{r+=nv.slice(0,W-8)+"\n";r+=row("  "+it.qty+"x₹"+it.price,amt)+"\n";}
  });
  r+=ln+"\n";r+=row("Subtotal","₹"+bill.subtotal)+"\n";
  if(bill.discount>0)r+=row("Discount","-₹"+bill.discount)+"\n";
  if(bill.gstEnabled)r+=row("GST (5%)","₹"+bill.gst)+"\n";
  r+=ln+"\n";r+=row("TOTAL","₹"+bill.total)+"\n";r+=ln+"\n";
  if(org.upiId)r+=c("UPI: "+org.upiId)+"\n";r+=c(org.thankMsg||"Thank You!")+"\n";
  return r;
}

// ── VarModal ──────────────────────────────────────────────────────────────────
function VarModal({item,onClose,onAdd}){
  const v=[];
  if(item.reg!=null)v.push({l:"Regular",p:item.reg});
  if(item.large!=null)v.push({l:item.mambo!=null?"Jumbo":"Large",p:item.large});
  if(item.mambo!=null)v.push({l:"Mambo",p:item.mambo});
  if(v.length===1){onAdd(item,v[0].l,v[0].p);onClose();return null;}
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal msm" onClick={e=>e.stopPropagation()}>
        <div className="m-hd"><span className="m-title">Select Size</span><div className="m-close" onClick={onClose}>✕</div></div>
        <div className="m-body">
          <div style={{fontSize:12,color:G.muted,marginBottom:9}}>{item.name}</div>
          <div className="var-grid">
            {v.map(x=>(
              <div key={x.l} className="var-btn" onClick={()=>{onAdd(item,x.l,x.p);onClose();}}>
                <div className="var-lbl">{x.l}</div><div className="var-price">₹{x.p}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PrintModal ────────────────────────────────────────────────────────────────
function PrintModal({bill,org,onClose,btOn,onBTPrint}){
  const txt=buildReceiptText(bill,org);
  const qr=(org.qrCodes||[])[0];
  const browserPrint=()=>{
    const w=window.open("","_blank");
    let h=`<style>body{font-family:monospace;font-size:12px;padding:16px;max-width:300px;}img.logo{width:72px;height:72px;border-radius:8px;display:block;margin:0 auto 8px;}.qr-wrap{text-align:right;margin-top:8px;}img.qr{width:72px;}</style>`;
    if(org.logo)h+=`<img class="logo" src="${org.logo}"/>`;
    h+=`<pre>${txt}</pre>`;
    if(qr)h+=`<div class="qr-wrap"><img class="qr" src="${qr.data}"/><div style="font-size:9px;color:#666;">${qr.label||"Pay via UPI"}</div></div>`;
    w.document.write(h);w.document.close();w.print();
  };
  return(
    <div className="overlay" onClick={onClose}>
      <div className="modal mlg" onClick={e=>e.stopPropagation()}>
        <div className="m-hd"><span className="m-title">🖨 Print Preview — Bill #{bill.billNo}</span><div className="m-close" onClick={onClose}>✕</div></div>
        <div className="m-body">
          <div className="rcpt-wrap">
            <div className="rcpt-txt">{txt}</div>
            <div className="rcpt-vis">
              <div style={{fontSize:10,color:G.muted,marginBottom:7,textTransform:"uppercase",letterSpacing:".5px"}}>Visual Preview</div>
              <div className="rv-card">
                {org.logo&&<img src={org.logo} className="rv-logo" alt="logo"/>}
                <div style={{textAlign:"center",fontWeight:"bold",fontSize:11}}>{org.name}</div>
                {org.address&&<div style={{textAlign:"center",fontSize:9,color:"#666"}}>{org.address}</div>}
                <hr style={{margin:"5px 0"}}/>
                <div style={{fontSize:9}}>Bill #{bill.billNo} · {bill.date}</div>
                <div style={{fontSize:9}}>{bill.staff} · {bill.paymentMode}</div>
                <hr style={{margin:"5px 0"}}/>
                {bill.items.slice(0,4).map((it,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:9}}>
                    <span>{it.name.slice(0,14)} x{it.qty}</span><span>₹{it.qty*it.price}</span>
                  </div>
                ))}
                {bill.items.length>4&&<div style={{fontSize:9,color:"#999"}}>+{bill.items.length-4} more…</div>}
                <hr style={{margin:"5px 0"}}/>
                <div style={{display:"flex",justifyContent:"space-between",fontWeight:"bold",fontSize:11}}>
                  <span>TOTAL</span><span>₹{bill.total}</span>
                </div>
                <div className="rv-foot">
                  <div style={{fontSize:8,color:"#888"}}>{org.thankMsg}</div>
                  {qr&&<div style={{textAlign:"center"}}><img src={qr.data} className="rv-qr" alt="QR"/><div style={{fontSize:8,color:"#888"}}>{qr.label||"Pay"}</div></div>}
                </div>
              </div>
            </div>

// ── CodeBlock ─────────────────────────────────────────────────────────────────
function CodeBlock({code}){
  const[copied,setCopied]=useState(false);
  const copy=()=>{navigator.clipboard?.writeText(code).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1800);});};
  return(
    <div style={{position:"relative",marginTop:7}}>
      <pre style={{background:"#0a0c0f",border:`1px solid ${G.border}`,borderRadius:8,padding:"11px 13px",fontSize:10.5,color:"#a8d8a8",fontFamily:"'Courier New',monospace",lineHeight:1.65,overflowX:"auto",whiteSpace:"pre",margin:0}}>{code}</pre>
      <button onClick={copy} style={{position:"absolute",top:5,right:5,padding:"2px 8px",borderRadius:5,border:`1px solid ${G.border}`,background:copied?G.green:G.card,color:copied?G.white:G.muted,fontSize:9,cursor:"pointer",fontFamily:"'Barlow Condensed'",fontWeight:600,transition:"all .2s"}}>
        {copied?"✓ COPIED":"COPY"}
      </button>
    </div>
  );
}

const MTP2_STEPS=[

<uses-permission android:name="android.permission.BLUETOOTH_SCAN"/>`,note:"Android 12+ also requires runtime permission requests. App will crash silently without them."},
  {icon:"🖨️",title:"PrinterManager.java — Production SPP",code:`public class PrinterManager {
    private static BluetoothSocket socket;
    private static OutputStream outputStream;
    private static final UUID SPP_UUID =
            UUID.fromString("00001101-0000-1000-8000-00805F9B34FB");

    public static void connect(String macAddress) throws IOException {
        BluetoothAdapter adapter = BluetoothAdapter.getDefaultAdapter();
        BluetoothDevice device = adapter.getRemoteDevice(macAddress);
        adapter.cancelDiscovery(); // stops scan interference
        socket = device.createRfcommSocketToServiceRecord(SPP_UUID);
        socket.connect();
        outputStream = socket.getOutputStream();
    }

    public static void print(String text) throws IOException {
        if (socket == null || !socket.isConnected())
            throw new IOException("Printer not connected");
        outputStream.write(new byte[]{0x1B, 0x40}); // Init
        outputStream.write(text.getBytes("UTF-8"));  // Content
        outputStream.write("\\n\\n".getBytes());       // Feed
        outputStream.write(new byte[]{0x1D, 0x56, 0x41, 0x10}); // Cut
        outputStream.flush();
    }

    public static void disconnect() throws IOException {
        if (outputStream != null) outputStream.close();
        if (socket != null) socket.close();
    }
}`,note:"Keep socket open. Connect once on app start, reuse for every print. Speed: <1 second."},

// ── LoginScreen ───────────────────────────────────────────────────────────────
function LoginScreen({onLogin}){
  const[role,setRole]=useState(null);
  const[pin,setPin]=useState("");
  const[err,setErr]=useState("");
  const[aPin,setAPin]=useState(DEFAULT_PIN);
  useEffect(()=>{window.storage?.get("adminPin").then(r=>{if(r?.value)setAPin(r.value);}).catch(()=>{});},[]);
  const pressKey=(k)=>{
    if(pin.length>=4)return;
    const np=pin+k; setPin(np); setErr("");
    if(np.length===4){setTimeout(()=>{if(np===aPin)onLogin("admin");else{setErr("Wrong PIN");setPin("");}},200);}
  };
  return(
    <div className="login-bg">
      <div className="login-card">
        <div className="login-logo">🔥</div>
        <div className="login-title">H.B.S Kabab Corner</div>
        <div className="login-sub">POS v9 · Coles Park, Bengaluru</div>
        {!role?(
          <>
            <div style={{fontSize:12,color:G.muted,marginBottom:13}}>Select your role to continue</div>
            <div className="role-grid">
              <div className={`role-btn ${role==="admin"?"sel":""}`} onClick={()=>setRole("admin")}>
                <div className="role-icon">🔐</div><div className="role-lbl">Admin</div><div className="role-hint">4-digit PIN</div>
              </div>
              <div className="role-btn" onClick={()=>onLogin("staff")}>
                <div className="role-icon">👨‍🍳</div><div className="role-lbl">Staff</div><div className="role-hint">No PIN needed</div>
              </div>
            </div>
          </>
        ):(
          <>
            <div style={{fontSize:12,color:G.muted,marginBottom:13}}>Enter Admin PIN</div>
            <div className="pin-display">{[0,1,2,3].map(i=><div key={i} className={`pin-dot ${i<pin.length?"on":""}`}/>)}</div>
            <div className="pin-grid">
              {[1,2,3,4,5,6,7,8,9].map(n=><div key={n} className="pin-key" onClick={()=>pressKey(String(n))}>{n}</div>)}
              <div className="pin-key" style={{fontSize:12,color:G.muted}} onClick={()=>setRole(null)}>← Back</div>
              <div className="pin-key" onClick={()=>pressKey("0")}>0</div>
              <div className="pin-key" onClick={()=>setPin(p=>p.slice(0,-1))}>⌫</div>
            </div>
            <div className="pin-err">{err}</div>
          </>
        )}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState("login");
  const[role,setRole]=useState(null);
  const[adminPin,setAdminPin]=useState(DEFAULT_PIN);
  const[org,setOrg]=useState(DEFAULT_ORG);
  const[menu,setMenu]=useState(BASE_MENU);
  const[activeCat,setActiveCat]=useState(Object.keys(BASE_MENU)[0]);
  const[cart,setCart]=useState([]);
  const[gstOn,setGstOn]=useState(false);
  const[disc,setDisc]=useState("");
  const[discT,setDiscT]=useState("%");
  const[payMode,setPayMode]=useState("Cash");
  const[staff,setStaff]=useState(STAFF_LIST[0]);
  const[billNo,setBillNo]=useState(()=>genBillNo());
  const[held,setHeld]=useState([]);
  const[sales,setSales]=useState([]);
  const[btOn,setBtOn]=useState(false);
  const[totalsOpen,setTotalsOpen]=useState(false);
  const[btScanM,setBtScanM]=useState(false);
  const[toast,setToast]=useState(null);
  const[tk,setTk]=useState(0);
  const now=useClock();
  const cartRef=useRef();
  const[varM,setVarM]=useState(null);
  const[printM,setPrintM]=useState(null);
  const[histM,setHistM]=useState(false);
  const[heldM,setHeldM]=useState(false);
  const[repM,setRepM]=useState(false);
  const[adminM,setAdminM]=useState(false);

  useEffect(()=>{
    const load=async()=>{
      try{
        const p=await window.storage?.get("adminPin");if(p?.value)setAdminPin(p.value);
        const o=await window.storage?.get("org");if(o?.value)setOrg(JSON.parse(o.value));
        const m=await window.storage?.get("menu");if(m?.value)setMenu(JSON.parse(m.value));
        const s=await window.storage?.get("sales");if(s?.value)setSales(JSON.parse(s.value));
      }catch(e){}
    };
    load();
    const t=setInterval(()=>setBtOn(btPrinter.connected),2000);
    return()=>clearInterval(t);
  },[]);

  const toast2=useCallback((msg,type="ok")=>{setToast({msg,type});setTk(k=>k+1);setTimeout(()=>setToast(null),2500);},[]);

  const addToCart=useCallback((item,variant,price)=>{
    setCart(prev=>{
      const key=item.id+"-"+variant;
      const ex=prev.find(c=>c.key===key);
      if(ex)return prev.map(c=>c.key===key?{...c,qty:c.qty+1}:c);
      return[...prev,{key,id:item.id,name:item.name,variant,price,qty:1}];
    });
    setTimeout(()=>{if(cartRef.current)cartRef.current.scrollTop=cartRef.current.scrollHeight;},50);
  },[]);

  const tapItem=useCallback((item)=>{
    if(item.outOfStock)return;
    const v=[];
    if(item.reg!=null)v.push({l:"Regular",p:item.reg});
    if(item.large!=null)v.push({l:item.mambo!=null?"Jumbo":"Large",p:item.large});
    if(item.mambo!=null)v.push({l:"Mambo",p:item.mambo});
    if(v.length===1)addToCart(item,v[0].l,v[0].p);
    else setVarM(item);
  },[addToCart]);

  const changeQty=(key,d)=>setCart(prev=>prev.map(c=>c.key===key?{...c,qty:c.qty+d}:c).filter(c=>c.qty>0));
  const removeItem=(key)=>setCart(prev=>prev.filter(c=>c.key!==key));

  const subtotal=cart.reduce((s,c)=>s+c.price*c.qty,0);
  const discVal=useMemo(()=>{const d=parseFloat(disc)||0;return discT==="%"?Math.round(subtotal*d/100):Math.min(d,subtotal);},[disc,discT,subtotal]);
  const afterD=subtotal-discVal;
  const gst=gstOn?Math.round(afterD*0.05):0;
  const total=afterD+gst;
  const cartIds=cart.map(c=>c.id);

  const holdBill=()=>{
    if(!cart.length){toast2("Cart is empty","err");return;}
    const h={billNo,items:cart,total,time:`${pad2(now.getHours())}:${pad2(now.getMinutes())}`};
    setHeld(p=>[...p,h]);setBillNo(genBillNo());setCart([]);setDisc("");toast2("Bill #"+h.billNo+" held");
  };
  const resumeHeld=(h)=>{
    if(cart.length){toast2("Clear cart first","err");return;}
    setCart(h.items);setBillNo(h.billNo);setHeld(p=>p.filter(x=>x.billNo!==h.billNo));toast2("Resumed #"+h.billNo);
  };
  const generateBill=()=>{
    if(!cart.length){toast2("Cart is empty","err");return;}
    const bill={billNo,items:cart,subtotal,discount:discVal,gstEnabled:gstOn,gst,total,paymentMode:payMode,staff,
      date:now.toLocaleDateString("en-IN"),time:`${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`};
    const ns=[...sales,bill];setSales(ns);window.storage?.set("sales",JSON.stringify(ns)).catch(()=>{});
    setPrintM(bill);setBillNo(genBillNo());setCart([]);setDisc("");setPayMode("Cash");toast2("Bill #"+bill.billNo+" done!");
  };
  const btPrint=async(txt)=>{
    try{
      const d=concatBytes([CMD.INIT,CMD.CENTER,strBytes(org.name+"\n"),CMD.LEFT,strBytes(txt+"\n"),CMD.LF,CMD.CUT]);
      await btPrinter.print(d);toast2("Sent to printer!");
    }catch(e){toast2("Print failed: "+e.message,"err");}
  };
  useEffect(()=>{window._openBTScan=()=>setBtScanM(true);return()=>{delete window._openBTScan;};},[]);
  const cycleStaff=()=>setStaff(s=>STAFF_LIST[(STAFF_LIST.indexOf(s)+1)%STAFF_LIST.length]);

  const timeStr=`${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
  const dateStr=now.toLocaleDateString("en-IN",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
  const cats=Object.keys(menu);
  const todayRev=sales.reduce((s,b)=>s+b.total,0);

  if(screen==="login") return <LoginScreen onLogin={(r)=>{setRole(r);setScreen("pos");}}/>;

  return(
    <div className="pos-root">
      {/* HEADER */}
      <div className="header">
        <div className="h-brand">
          <div className="h-logo">{org.logo?<img src={org.logo} alt="logo"/>:"🔥"}</div>
          <div><div className="h-title">{org.name.split(" ").slice(0,4).join(" ")}</div><div className="h-sub">Coles Park · {role?.toUpperCase()}</div></div>
        </div>
        <div className="h-btns">
          <div style={{display:"flex",alignItems:"center",gap:4,padding:"4px 8px",borderRadius:6,border:`1px solid ${G.border}`,background:G.card}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:btOn?G.green:G.muted}}/>
            <span style={{fontSize:10,color:G.muted,fontFamily:"'Barlow Condensed'",fontWeight:600,textTransform:"uppercase",letterSpacing:".3px"}}>{btOn?"BT Ready":"BT Off"}</span>
          </div>
          <button className="nav-btn" onClick={()=>setBtScanM(true)}>📡 BT Connect</button>
          <button className="nav-btn" onClick={()=>setHistM(true)}>📋 History</button>
          {role==="admin"&&<button className="nav-btn" onClick={()=>setRepM(true)}>📊 Reports</button>}
          <button className="nav-btn" onClick={()=>setHeldM(true)}>⏸ Held{held.length>0?<span style={{color:G.amber}}> ({held.length})</span>:null}</button>
          {role==="admin"&&<button className="nav-btn adm" onClick={()=>setAdminM(true)}>⚙️ Admin</button>}
          <button className="nav-btn" onClick={()=>setScreen("login")}>🚪</button>
        </div>
        <div style={{textAlign:"right"}}><div className="h-clock">{timeStr}</div><div className="h-date">{dateStr}</div></div>
      </div>

      {/* MAIN */}
      <div className="main">
        <div className="menu-area">
          <div className="cat-tabs">
            {cats.map(cat=><div key={cat} className={`cat-tab ${activeCat===cat?"act":""}`} onClick={()=>setActiveCat(cat)}>{cat}</div>)}
          </div>
          <div className="grid-wrap">
            <div className="item-grid">
              {(menu[activeCat]||[]).map(item=>{
                const inCart=cartIds.includes(item.id);
                const qty=cart.filter(c=>c.id===item.id).reduce((s,c)=>s+c.qty,0);
                const bp=item.reg??item.large;
                const hasV=(item.reg!=null&&item.large!=null)||item.mambo!=null;
                return(
                  <div key={item.id} className={`item-card ${inCart?"ic":""} ${item.outOfStock?"oos":""}`} onClick={()=>tapItem(item)}>
                    {qty>0&&<div className="iq-badge">{qty}</div>}
                    <div className="item-name">{item.name}</div>
                    <div className="item-foot">
                      <div><div className="item-price">₹{bp}</div>{hasV&&<div className="item-hint">Tap for sizes</div>}</div>
                      {item.outOfStock?<span className="badge badge-r">OUT</span>:inCart&&<span className="badge badge-g">✓</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* CART */}
        <div className="cart-panel">
          <div className="cart-hd"><div className="cart-title">🛒 Order</div><div className="bill-no">#{billNo}</div></div>
          <div className="cart-items" ref={cartRef}>
            {cart.length===0?<div className="cart-empty"><div style={{fontSize:30,opacity:.3}}>🍽️</div><div>Tap items to add</div></div>
            :cart.map(ci=>(
              <div key={ci.key} className="ci">
                <div className="ci-info"><div className="ci-name">{ci.name}</div><div className="ci-var">{ci.variant} · ₹{ci.price}</div></div>
                <div className="ci-ctrl">
                  <button className="ci-btn" onClick={()=>changeQty(ci.key,-1)}>−</button>
                  <div className="ci-qty">{ci.qty}</div>
                  <button className="ci-btn" onClick={()=>changeQty(ci.key,1)}>+</button>
                </div>
                <div className="ci-price">₹{ci.qty*ci.price}</div>
                <div className="ci-del" onClick={()=>removeItem(ci.key)}>✕</div>
              </div>
            ))}
          </div>

          <div className="totals">
            <div className="totals-grand" onClick={()=>setTotalsOpen(o=>!o)}>
              <span className="gt-lbl">Total<span className={`gt-chevron ${totalsOpen?"open":""}`}>▲</span></span>
              <span className="gt-val">{fmtINR(total)}</span>
            </div>
            <div className={`totals-slide ${totalsOpen?"open":""}`}>
              <div className="totals-inner">
                <div className="t-row"><span className="t-lbl">Subtotal</span><span className="t-val">₹{subtotal}</span></div>
                <div className="t-row">
                  <span className="t-lbl">Discount</span>
                  <div className="disc-row">
                    <button className={`disc-t ${discT==="%"?"on":""}`} onClick={e=>{e.stopPropagation();setDiscT("%");}}>%</button>
                    <button className={`disc-t ${discT==="₹"?"on":""}`} onClick={e=>{e.stopPropagation();setDiscT("₹");}}>₹</button>
                    <input className="disc-in" type="number" value={disc} onChange={e=>setDisc(e.target.value)} onClick={e=>e.stopPropagation()} placeholder="0" min="0"/>
                  </div>
                </div>
                {discVal>0&&<div className="t-row"><span className="t-lbl">Disc Amt</span><span className="t-val" style={{color:G.green}}>-₹{discVal}</span></div>}
                <div className="t-row">
                  <div style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer"}} onClick={e=>{e.stopPropagation();setGstOn(v=>!v);}}>
                    <div className={`pill ${gstOn?"on":""}`}><div className="pill-dot"/></div>
                    <span className="t-lbl">GST 5%</span>
                  </div>
                  <span className="t-val">{gstOn?`₹${gst}`:"—"}</span>
                </div>
              </div>
            </div>
          </div>

          <div className="pay-sec">
            <div className="pay-grid">
              {["Cash","UPI","Split","Pending"].map(m=>(
                <button key={m} className={`pay-btn ${payMode===m?(m==="Pending"?"psel":"sel"):""}`} onClick={()=>setPayMode(m)}>
                  {m==="Cash"?"💵 Cash":m==="UPI"?"📱 UPI":m==="Split"?"⚡ Split":"⏳ Pending"}
                </button>
              ))}
            </div>
            <div className="act-grid">
              <button className="btn-hold" onClick={holdBill}>⏸ Hold</button>
              <button className="btn-bill" onClick={generateBill} disabled={!cart.length}>🧾 Bill</button>
              <button className="btn-clr" onClick={()=>{setCart([]);setDisc("");}}>✕ Clear Cart</button>
            </div>
          </div>
        </div>
      </div>

      {/* STATUS BAR */}
      <div className="status-bar">
        <div className="si"><div className="si-dot"/><span>Offline · Ready · {role?.toUpperCase()}</span></div>
        <div className="si-staff" onClick={cycleStaff} title="Tap to change staff">
          <div style={{width:6,height:6,borderRadius:"50%",background:G.green}}/>
          <span>👨‍🍳 {staff}</span>
          <span style={{fontSize:9,opacity:.6}}>▾</span>
        </div>
        <div className="si">Bills: {sales.length} · Rev: {fmtINR(todayRev)}</div>
        <div className="si">HBS POS v9</div>
      </div>

      {varM&&<VarModal item={varM} onClose={()=>setVarM(null)} onAdd={addToCart}/>}
      {btScanM&&<BTScanModal onClose={()=>setBtScanM(false)} onConnected={(name)=>{setBtOn(true);toast2("✓ Connected: "+name);}}/>}
      {printM&&<PrintModal bill={printM} org={org} onClose={()=>setPrintM(null)} btOn={btOn} onBTPrint={btPrint}/>}
      {heldM&&<HeldModal held={held} onResume={resumeHeld} onClose={()=>setHeldM(false)}/>}
      {repM&&<ReportsModal sales={sales} onClose={()=>setRepM(false)}/>}
      {histM&&<HistoryModal sales={sales} org={org} onClose={()=>setHistM(false)} btOn={btOn} onBTPrint={btPrint}/>}
      {adminM&&role==="admin"&&<AdminPanel org={org} setOrg={setOrg} menu={menu} setMenu={setMenu} adminPin={adminPin} setAdminPin={setAdminPin} btOn={btOn} setBtOn={setBtOn} onClose={()=>setAdminM(false)}/>}
      {toast&&<div key={tk} className={`toast ${toast.type==="err"?"err":toast.type==="info"?"info":""}`}>{toast.msg}</div>}
    </div>
  );
}

// Inject CSS & render
const styleEl = document.createElement("style");
styleEl.textContent = CSS;
document.head.appendChild(styleEl);

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
